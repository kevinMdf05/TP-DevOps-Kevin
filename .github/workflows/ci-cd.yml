name: CI-CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  BACKEND_IMAGE_NAME: tp-backend
  FRONTEND_IMAGE_NAME: tp-frontend

jobs:

  # ---------------------------------------------------------------------
  # 1) Install deps + 2) Tests
  # ---------------------------------------------------------------------
  test:
    name: Install & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

  # ---------------------------------------------------------------------
  # 3) Build Docker + 4) Push GHCR
  # ---------------------------------------------------------------------
  build-and-push:
    name: Build & Push images
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase owner
        id: meta
        run: |
          OWNER_LC=$(echo "${{ env.IMAGE_OWNER }}" | tr '[:upper:]' '[:lower:]')
          SHA=${GITHUB_SHA::7}
          BACKEND_IMAGE="${{ env.REGISTRY }}/$OWNER_LC/${{ env.BACKEND_IMAGE_NAME }}:$SHA"
          FRONTEND_IMAGE="${{ env.REGISTRY }}/$OWNER_LC/${{ env.FRONTEND_IMAGE_NAME }}:$SHA"
          echo "backend_image=$BACKEND_IMAGE"   >> "$GITHUB_OUTPUT"
          echo "frontend_image=$FRONTEND_IMAGE" >> "$GITHUB_OUTPUT"
          echo "owner_lc=$OWNER_LC"             >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"                       >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner_lc }}/${{ env.BACKEND_IMAGE_NAME }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner_lc }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ---------------------------------------------------------------------
  # 5) Deploy sur VM via SSH + 6) kubectl apply
  # ---------------------------------------------------------------------
  deploy:
    name: Deploy to VM (K3s)
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Add VM to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Copy k8s manifests to VM
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "mkdir -p ~/tp-app/k8s"
          scp -r k8s/* ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/tp-app/k8s/

      - name: Run deploy on VM
        env:
          BACKEND_IMAGE:  ${{ needs.build-and-push.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            "chmod +x ~/tp-app/k8s/deploy.sh && \
             BACKEND_IMAGE='${BACKEND_IMAGE}' \
             FRONTEND_IMAGE='${FRONTEND_IMAGE}' \
             GHCR_USER='${{ secrets.GHCR_USER }}' \
             GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}' \
             GHCR_EMAIL='${{ secrets.GHCR_EMAIL }}' \
             DB_USER='${{ secrets.DB_USER }}' \
             DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
             DB_NAME='${{ secrets.DB_NAME }}' \
             bash ~/tp-app/k8s/deploy.sh"

      - name: Smoke test via VM public IP
        run: |
          echo "Waiting 20s for pods to serve"
          sleep 20
          curl -fsSL --max-time 10 http://${{ secrets.VM_HOST }}:30080/health || echo "health not reachable (check NSG)"
