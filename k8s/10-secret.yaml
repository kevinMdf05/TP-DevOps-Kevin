# NB : placeholder committable. En prod on crée le Secret au déploiement via
#      kubectl create secret generic db-credentials --from-literal=...
#      ou via un outil (SealedSecrets, ExternalSecrets). Ici valeur par défaut
#      (changée par le pipeline via envsubst ou kubectl create --dry-run).
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: tp-app
type: Opaque
stringData:
  DB_USER: app
  DB_PASSWORD: CHANGE_ME_AT_DEPLOY
  DB_NAME: appdb
