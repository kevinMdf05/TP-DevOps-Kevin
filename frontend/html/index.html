<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TP DevOps — Messages</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #0f172a;
      color: #e2e8f0;
    }
    h1 { color: #38bdf8; margin-bottom: 0.25rem; }
    .sub { color: #94a3b8; margin-top: 0; }
    .card {
      background: #1e293b;
      padding: 1rem 1.25rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      border: 1px solid #334155;
    }
    form { display: flex; gap: 0.5rem; }
    input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
    }
    button {
      padding: 0.6rem 1rem;
      border: 0;
      border-radius: 6px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #0ea5e9; }
    .msg { padding: 0.5rem 0; border-bottom: 1px solid #334155; }
    .msg:last-child { border-bottom: 0; }
    .ts { color: #64748b; font-size: 0.8rem; }
    .status { font-family: monospace; font-size: 0.85rem; }
    .ok { color: #4ade80; }
    .ko { color: #f87171; }
  </style>
</head>
<body>
  <h1>TP DevOps</h1>
  <p class="sub">Application full-stack Docker + Kubernetes + CI/CD</p>

  <div class="card">
    <strong>API status :</strong>
    <span id="status" class="status">chargement…</span>
  </div>

  <div class="card">
    <form id="msgForm">
      <input id="msgInput" type="text" maxlength="200" placeholder="Écris un message…" required />
      <button type="submit">Envoyer</button>
    </form>
  </div>

  <div class="card" id="messages">Chargement…</div>

  <script>
    const API_BASE = window.__API_BASE__ || '/api';

    async function refreshStatus() {
      const el = document.getElementById('status');
      try {
        const r = await fetch(API_BASE.replace(/\/api$/, '') + '/health');
        const j = await r.json();
        el.innerHTML = '<span class="ok">' + j.status + '</span> · db=' + j.db + ' · uptime=' + Math.round(j.uptime) + 's';
      } catch (e) {
        el.innerHTML = '<span class="ko">unreachable</span>';
      }
    }

    async function refreshMessages() {
      const el = document.getElementById('messages');
      try {
        const r = await fetch(API_BASE + '/messages');
        const list = await r.json();
        if (!list.length) { el.textContent = 'Aucun message. Envoie le premier !'; return; }
        el.innerHTML = list.map(m =>
          '<div class="msg"><div>' + escapeHtml(m.content) + '</div><div class="ts">' + new Date(m.created_at).toLocaleString() + '</div></div>'
        ).join('');
      } catch (e) {
        el.innerHTML = '<span class="ko">Erreur API</span>';
      }
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    document.getElementById('msgForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('msgInput');
      const content = input.value.trim();
      if (!content) return;
      await fetch(API_BASE + '/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content }),
      });
      input.value = '';
      refreshMessages();
    });

    refreshStatus();
    refreshMessages();
    setInterval(refreshStatus, 5000);
  </script>
</body>
</html>
